name: Build All APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-all-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Build ManagedConfigurations ──────────────────────────────────────
      - name: Build ManagedConfigurations APK
        id: build_managed
        continue-on-error: true
        run: |
          cd ManagedConfigurations
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Upload ManagedConfigurations APK
        uses: actions/upload-artifact@v4
        with:
          name: managed-configurations-app
          path: ManagedConfigurations/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ── Build Work-profile-codelab ───────────────────────────────────────
      - name: Build Work Profile APKs
        id: build_work_profile
        continue-on-error: true
        run: |
          cd Work-profile-codelab
          chmod +x gradlew
          ./gradlew :app-starter:assembleDebug :app-finished:assembleDebug --stacktrace

      - name: Upload Work Profile Starter APK
        uses: actions/upload-artifact@v4
        with:
          name: work-profile-app-starter
          path: Work-profile-codelab/app-starter/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Work Profile Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: work-profile-app-finished
          path: Work-profile-codelab/app-finished/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      # ── Collect APKs into releases/apks/ ────────────────────────────────
      - name: Copy APKs to releases folder
        run: |
          mkdir -p releases/apks
          MANAGED=$(find ManagedConfigurations/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -n 1)
          STARTER=$(find Work-profile-codelab/app-starter/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -n 1)
          FINISHED=$(find Work-profile-codelab/app-finished/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -n 1)
          [ -n "$MANAGED" ]  && cp "$MANAGED"  releases/apks/ManagedConfigurations.apk  || echo "ManagedConfigurations APK not found, skipping"
          [ -n "$STARTER" ]  && cp "$STARTER"  releases/apks/WorkProfile-Starter.apk   || echo "WorkProfile-Starter APK not found, skipping"
          [ -n "$FINISHED" ] && cp "$FINISHED" releases/apks/WorkProfile-Finished.apk  || echo "WorkProfile-Finished APK not found, skipping"

      - name: Commit APKs to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add releases/
          git diff --staged --quiet || git commit -m "🤖 Auto-build: Update APKs [skip ci]"
          git push || echo "No changes to push"

      # ── Build status summary ─────────────────────────────────────────────
      - name: Build status summary
        if: always()
        run: |
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build_managed.outcome }}" = "success" ]; then
            echo "- ✅ ManagedConfigurations" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ ManagedConfigurations (outcome: ${{ steps.build_managed.outcome }})" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.build_work_profile.outcome }}" = "success" ]; then
            echo "- ✅ Work Profile (app-starter + app-finished)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Work Profile (outcome: ${{ steps.build_work_profile.outcome }})" >> $GITHUB_STEP_SUMMARY
          fi
