name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x Work-profile-codelab/gradlew

      - name: Build APK
        run: |
          cd Work-profile-codelab
          ./gradlew :app-finished:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: work-profile-app
          path: Work-profile-codelab/app-finished/build/outputs/apk/debug/*.apk

      - name: Copy APK to releases folder
        run: |
          mkdir -p releases
          APK=$(find Work-profile-codelab/app-finished/build/outputs/apk/debug -name "*.apk" | head -n 1)
          cp "$APK" releases/work-profile-app.apk

      - name: Commit APK to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add releases/
          git commit -m "Add built APK [skip ci]" || exit 0
          git push
